name: Bookstore CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x] # Rút gọn xuống bản ổn định nhất để tối ưu thời gian CI

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          backend/package-lock.json
          admin/package-lock.json

    # Frontend
    - name: Frontend - Install & Build
      working-directory: ./frontend
      run: |
        npm install
        npm run lint
        npm run build

    # Admin
    - name: Admin - Install & Build
      working-directory: ./admin
      run: |
        npm install
        npm run lint
        npm run build

    # Backend
    - name: Backend - Install & Lint
      working-directory: ./backend
      run: |
        npm install
        npm run lint

  deploy:
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4

    # Deploy Backend to Render
    - name: Deploy Backend to Render
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    # Deploy Frontend to Vercel
    - name: Deploy Frontend to Vercel
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        working-directory: ./frontend
        vercel-args: '--prod'

    # Deploy Admin to Vercel
    - name: Deploy Admin to Vercel
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        working-directory: ./admin
        vercel-args: '--prod'
